# Nome da aplicação
spring.application.name=viveiro

# Configuração da conexão com o banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/viveiros?useSSL=false&serverTimezone=UTC
spring.datasource.username=cidia
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração do JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Charset e timezone (opcional, mas recomendável)
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true


